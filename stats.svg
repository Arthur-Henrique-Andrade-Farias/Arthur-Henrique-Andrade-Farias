<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 380" width="1200" height="380">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0608"/>
      <stop offset="100%" stop-color="#14080b"/>
    </linearGradient>
    <linearGradient id="redLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#dc2626"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
    <pattern id="grid2" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#dc2626" stroke-opacity="0.06" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="380" fill="url(#bg2)"/>
  <rect width="1200" height="380" fill="url(#grid2)"/>

  <!-- Top red accent -->
  <rect width="1200" height="4" fill="url(#redLine)"/>

  <!-- Section title -->
  <g transform="translate(40, 40)">
    <rect width="4" height="22" fill="#ef4444"/>
    <text x="16" y="17" font-family="Consolas, monospace" font-size="13" fill="#fca5a5" letter-spacing="4" font-weight="700">
      TECHNICAL SNAPSHOT
    </text>
  </g>

  <text x="40" y="100" font-family="Calibri, Segoe UI, Arial, sans-serif" font-size="32" fill="#fafaf9" font-weight="700">
    Numbers behind the work
  </text>

  <rect x="40" y="115" width="60" height="3" fill="#dc2626"/>

  <!-- Stats Grid -->
  <!-- Card 1: Years -->
  <g transform="translate(40, 160)">
    <rect width="265" height="170" fill="#14080b" stroke="#dc2626" stroke-width="1" rx="2"/>
    <rect width="4" height="170" fill="#ef4444"/>
    <text x="20" y="32" font-family="Consolas, monospace" font-size="11" fill="#fca5a5" letter-spacing="3" font-weight="700">EXPERIENCE</text>
    <text x="20" y="100" font-family="Calibri, Segoe UI, Arial, sans-serif" font-size="64" fill="#ef4444" font-weight="700">5+</text>
    <text x="120" y="100" font-family="Calibri, Segoe UI, Arial, sans-serif" font-size="20" fill="#a1a1aa">years</text>
    <text x="20" y="135" font-family="Calibri, Segoe UI, Arial, sans-serif" font-size="14" fill="#fafaf9">Full-Stack &amp; QA Engineering</text>
    <text x="20" y="155" font-family="Calibri, Segoe UI, Arial, sans-serif" font-size="12" fill="#71717a">Across 18+ professional projects</text>
  </g>

  <!-- Card 2: Reliability -->
  <g transform="translate(323, 160)">
    <rect width="265" height="170" fill="#14080b" stroke="#dc2626" stroke-width="1" rx="2"/>
    <rect width="4" height="170" fill="#ef4444"/>
    <text x="20" y="32" font-family="Consolas, monospace" font-size="11" fill="#fca5a5" letter-spacing="3" font-weight="700">QUALITY DELIVERED</text>
    <text x="20" y="100" font-family="Calibri, Segoe UI, Arial, sans-serif" font-size="64" fill="#ef4444" font-weight="700">98%+</text>
    <text x="20" y="135" font-family="Calibri, Segoe UI, Arial, sans-serif" font-size="14" fill="#fafaf9">Reliability across</text>
    <text x="20" y="155" font-family="Calibri, Segoe UI, Arial, sans-serif" font-size="14" fill="#fafaf9">4 production websites</text>
  </g>

  <!-- Card 3: Promotions -->
  <g transform="translate(606, 160)">
    <rect width="265" height="170" fill="#14080b" stroke="#dc2626" stroke-width="1" rx="2"/>
    <rect width="4" height="170" fill="#ef4444"/>
    <text x="20" y="32" font-family="Consolas, monospace" font-size="11" fill="#fca5a5" letter-spacing="3" font-weight="700">CAREER GROWTH</text>
    <text x="20" y="100" font-family="Calibri, Segoe UI, Arial, sans-serif" font-size="64" fill="#ef4444" font-weight="700">3x</text>
    <text x="120" y="100" font-family="Calibri, Segoe UI, Arial, sans-serif" font-size="20" fill="#a1a1aa">promotions</text>
    <text x="20" y="135" font-family="Calibri, Segoe UI, Arial, sans-serif" font-size="14" fill="#fafaf9">in 1 year at Kognit</text>
    <text x="20" y="155" font-family="Calibri, Segoe UI, Arial, sans-serif" font-size="12" fill="#71717a">Intern → Trainee → Junior</text>
  </g>

  <!-- Card 4: Recognition -->
  <g transform="translate(889, 160)">
    <rect width="270" height="170" fill="#14080b" stroke="#dc2626" stroke-width="1" rx="2"/>
    <rect width="4" height="170" fill="#ef4444"/>
    <text x="20" y="32" font-family="Consolas, monospace" font-size="11" fill="#fca5a5" letter-spacing="3" font-weight="700">RECOGNITION</text>
    <text x="20" y="80" font-family="Calibri, Segoe UI, Arial, sans-serif" font-size="28" fill="#ef4444" font-weight="700">B3 + MCTI</text>
    <text x="20" y="115" font-family="Calibri, Segoe UI, Arial, sans-serif" font-size="13" fill="#fafaf9">Honorable Mention by B3</text>
    <text x="20" y="135" font-family="Calibri, Segoe UI, Arial, sans-serif" font-size="13" fill="#fafaf9">+ MCTI official platform</text>
    <text x="20" y="155" font-family="Calibri, Segoe UI, Arial, sans-serif" font-size="11" fill="#71717a">PantanalDev 2025 · Data Science</text>
  </g>

  <!-- Bottom tagline -->
  <text x="600" y="365" font-family="Calibri, Segoe UI, Arial, sans-serif" font-size="14" fill="#fca5a5" font-style="italic" text-anchor="middle">
    Shipped code, real users, measurable quality.
  </text>
</svg>
