<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320" width="1280" height="320">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0608"/>
      <stop offset="50%" stop-color="#14080b"/>
      <stop offset="100%" stop-color="#1a0a0e"/>
    </linearGradient>
    <linearGradient id="redGlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#dc2626"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
    <radialGradient id="spotlight" cx="80%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#dc2626" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#dc2626" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#dc2626" stroke-opacity="0.08" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1280" height="320" fill="url(#bg)"/>
  <rect width="1280" height="320" fill="url(#grid)"/>
  <rect width="1280" height="320" fill="url(#spotlight)"/>

  <!-- Top red strip -->
  <rect width="1280" height="6" fill="url(#redGlow)"/>

  <!-- Side accent on the right -->
  <rect x="1274" width="6" height="320" fill="url(#redGlow)"/>

  <!-- Eyebrow tag -->
  <g transform="translate(80, 70)">
    <rect width="4" height="22" fill="#ef4444"/>
    <text x="16" y="17" font-family="Consolas, Courier New, monospace" font-size="13" fill="#fca5a5" letter-spacing="4" font-weight="700">
      SOFTWARE ENGINEER · QA · FULL-STACK · DATA · AI
    </text>
  </g>

  <!-- Name -->
  <text x="80" y="155" font-family="Calibri, Segoe UI, Arial, sans-serif" font-size="58" fill="#fafaf9" font-weight="700">
    Arthur Henrique
  </text>
  <text x="80" y="215" font-family="Calibri, Segoe UI, Arial, sans-serif" font-size="58" fill="#ef4444" font-weight="700">
    Andrade Farias
  </text>

  <!-- Red divider -->
  <rect x="80" y="240" width="90" height="3" fill="#dc2626"/>

  <!-- Tagline -->
  <text x="80" y="270" font-family="Calibri, Segoe UI, Arial, sans-serif" font-size="18" fill="#a1a1aa" font-style="italic">
    Building reliable, scalable software through quality.
  </text>

  <!-- Decorative tech icons (subtle, right side) -->
  <g opacity="0.4" transform="translate(950, 100)">
    <!-- Decorative dots/code symbols -->
    <text x="0" y="0" font-family="Consolas, monospace" font-size="14" fill="#fca5a5" letter-spacing="2">
      &lt;/&gt;  ·  { }  ·  [ ]
    </text>
    <text x="0" y="40" font-family="Consolas, monospace" font-size="12" fill="#71717a">
      JS · TS · Python · React · Node
    </text>
    <text x="0" y="65" font-family="Consolas, monospace" font-size="12" fill="#71717a">
      AWS · Azure · Databricks
    </text>
    <text x="0" y="90" font-family="Consolas, monospace" font-size="12" fill="#71717a">
      Cypress · Selenium · Postman
    </text>
    <text x="0" y="115" font-family="Consolas, monospace" font-size="12" fill="#71717a">
      PyTorch · Claude · Cursor
    </text>
  </g>
</svg>
